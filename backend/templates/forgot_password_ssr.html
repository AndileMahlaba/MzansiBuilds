{% extends "base.html" %}
{% block title %}Forgot password · MzansiBuilds{% endblock %}
{% block content %}
<div class="auth-page">
  <header class="page-head page-head--auth">
    <h1>Reset your password</h1>
    <p class="sub">Enter the email on your account. If it matches, you can open the reset link (in development we show a shortcut).</p>
  </header>
  <div class="auth-card">
    <form method="post" action="{{ url_for('main.forgot_password') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="auth-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
      </div>
      <button type="submit" class="btn btn--primary btn--auth-submit">Send reset link</button>
    </form>
    <p class="auth-footer"><a href="{{ url_for('main.login') }}">← Back to log in</a></p>
  </div>
</div>
{% endblock %}
