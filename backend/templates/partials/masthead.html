{# nav_active: overview | feed | celebration | system | '' #}
<div class="masthead-outer">
  <header class="masthead">
    <a class="masthead__brand" href="{{ url_for('main.home') }}">
      <span class="masthead__mark" aria-hidden="true">M</span>
      <span>MzansiBuilds</span>
    </a>
    <nav class="masthead__nav" aria-label="Main">
      <a
        href="{{ url_for('main.home') }}"
        {% if nav_active == 'overview' %}aria-current="page"{% endif %}
        >Overview</a
      >
      <a
        href="{{ url_for('main.ssr_feed') }}"
        {% if nav_active == 'feed' %}aria-current="page"{% endif %}
        >Feed</a
      >
      <a
        href="{{ url_for('main.ssr_celebration') }}"
        {% if nav_active == 'celebration' %}aria-current="page"{% endif %}
        >Celebration</a
      >
      <a
        href="{{ url_for('main.ssr_system') }}"
        {% if nav_active == 'system' %}aria-current="page"{% endif %}
        >System</a
      >
    </nav>
    <div class="masthead__actions">
      {% if current_user.is_authenticated %}
      <span class="page-meta">{{ current_user.name }}</span>
      <form
        method="post"
        action="{{ url_for('main.logout') }}"
        style="display: inline"
      >
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit" class="btn btn--ghost">Log out</button>
      </form>
      {% else %}
      <a class="btn btn--outline" href="{{ url_for('main.login') }}">Log in</a>
      <a class="btn btn--primary" href="{{ url_for('main.register') }}">Register</a>
      {% endif %}
    </div>
  </header>
</div>
