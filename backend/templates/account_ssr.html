{% extends "app_shell.html" %}
{% block title %}Account{% endblock %}
{% block app_main %}
<header class="app-page-header">
  <h1 class="app-page-title">Account</h1>
  <p class="app-page-lead">Your public profile — name and bio stay in sync across the platform.</p>
</header>

<div class="gh-panel" style="max-width: 32rem">
  <form method="post" action="{{ url_for('main.account') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <label class="field-label" for="name">Display name</label>
    <input class="field-input" id="name" name="name" type="text" value="{{ current_user.name }}" required />
    <label class="field-label" for="bio">Bio</label>
    <textarea class="field-input" id="bio" name="bio" rows="4" maxlength="500">{{ current_user.bio or '' }}</textarea>
    <p class="field-hint">{{ (current_user.email) }} — email change not supported here.</p>
    <button type="submit" class="btn btn--primary">Save profile</button>
  </form>
</div>
{% endblock %}
