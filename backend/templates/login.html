{% extends "base.html" %}
{% block title %}Log in · MzansiBuilds{% endblock %}
{% block content %}
<section class="panel panel--narrow">
  <h1>Log in</h1>
  <form method="post" novalidate>
    {{ form.hidden_tag() }}
    <label class="field">{{ form.email.label }} {{ form.email(class="input") }}</label>
    <label class="field">{{ form.password.label }} {{ form.password(class="input") }}</label>
    {{ form.submit(class="btn") }}
  </form>
  <p class="muted">No account yet? <a href="{{ url_for('auth.register') }}">Register</a></p>
</section>
{% endblock %}
