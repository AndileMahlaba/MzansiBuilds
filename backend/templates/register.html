{% extends "base.html" %}
{% block title %}Register · MzansiBuilds{% endblock %}
{% block content %}
<section class="panel panel--narrow">
  <h1>Create an account</h1>
  <form method="post" novalidate>
    {{ form.hidden_tag() }}
    <label class="field">{{ form.name.label }} {{ form.name(class="input") }}</label>
    <label class="field">{{ form.email.label }} {{ form.email(class="input") }}</label>
    <label class="field">{{ form.password.label }} {{ form.password(class="input") }}</label>
    <p class="hint">Use at least 8 characters for your password.</p>
    {{ form.submit(class="btn") }}
  </form>
  <p class="muted">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</section>
{% endblock %}
