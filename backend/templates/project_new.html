{% extends "base.html" %}
{% block title %}New project · MzansiBuilds{% endblock %}
{% block content %}
<section class="panel">
  <h1>Create a project</h1>
  <form method="post" novalidate>
    {{ form.hidden_tag() }}
    <label class="field">{{ form.title.label }} {{ form.title(class="input") }}</label>
    <label class="field">{{ form.description.label }} {{ form.description(class="input input--area", rows=5) }}</label>
    <label class="field">{{ form.stage.label }} {{ form.stage(class="input") }}</label>
    <label class="field">{{ form.support_needed.label }} {{ form.support_needed(class="input", placeholder="e.g. UI designer, backend pair") }}</label>
    {{ form.submit(class="btn") }}
  </form>
</section>
{% endblock %}
